<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Panel — AI Jastip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--gold:#F5A623;--bg:#0d0d0d;--card:#181818;--card2:#202020;--border:#2c2c2c;--text:#f0f0f0;--muted:#777;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;}
.page{display:none;flex-direction:column;position:fixed;inset:0;}
.page.active{display:flex;}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.login-logo{font-size:48px;margin-bottom:12px;}
.login-title{font-size:24px;font-weight:800;margin-bottom:6px;color:var(--gold);}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.login-input{width:100%;max-width:280px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:20px;color:var(--text);font-family:'Inter',sans-serif;margin-bottom:12px;outline:none;text-align:center;letter-spacing:8px;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;max-width:280px;background:var(--gold);color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.conn-info{margin-top:12px;font-size:11px;color:var(--muted);}

/* HEADER */
.admin-header{background:#111;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-title{font-size:15px;font-weight:800;color:var(--gold);}
.admin-sub{font-size:10px;color:var(--muted);}
.live-row{display:flex;align-items:center;gap:6px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:11px;font-weight:700;color:var(--green);}

/* TIMER */
.timer-section{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0;}
.timer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.timer-display{font-size:30px;font-weight:800;letter-spacing:3px;}
.timer-display.ok{color:var(--green);}
.timer-display.warn{color:var(--gold);}
.timer-display.danger{color:var(--red);}
.timer-lbl{font-size:10px;color:var(--muted);margin-top:1px;}
.timer-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.t-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.t-btn:active{opacity:.7;}
.t-btn.red{border-color:rgba(239,68,68,.4);color:var(--red);}

/* BODY */
.admin-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.status-bar{padding:10px 14px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;}
.status-open{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.status-closed{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;color:var(--gold);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.grand-total{background:var(--card);border:1px solid rgba(245,166,35,.3);border-radius:10px;padding:13px;display:flex;justify-content:space-between;align-items:center;}
.gt-lbl{font-size:12px;color:#ccc;font-weight:600;}
.gt-val{font-size:20px;font-weight:800;color:var(--gold);}
.sec-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.order-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.order-name{font-size:14px;font-weight:800;}
.order-time{font-size:10px;color:var(--muted);}
.pay-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.pay-dana{background:rgba(96,165,250,.2);color:#60a5fa;}
.pay-bsi{background:rgba(34,197,94,.15);color:var(--green);}
.pay-cash{background:rgba(245,166,35,.15);color:var(--gold);}
.pay-shopee{background:rgba(255,80,80,.2);color:#ff5050;}
.order-items{font-size:12px;color:#bbb;line-height:1.8;}
.order-subtotal{margin-top:8px;padding-top:7px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;font-weight:800;color:var(--gold);}
.empty-state{text-align:center;padding:32px 20px;color:var(--muted);}
.actions{display:flex;flex-direction:column;gap:8px;}
.act-btn{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.act-btn:active{opacity:.8;}
.btn-wa{background:#25D366;color:#000;}
.btn-open{background:var(--green);color:#000;}
.btn-close{background:var(--red);color:#fff;}
.btn-reset{background:var(--card2);border:1px solid var(--border);color:var(--text);}
.logout-btn{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;text-align:center;padding:6px;}
.btn-excel{background:#1D6F42;color:#fff;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="page active" id="page-login">
  <div class="login-wrap">
    <div class="login-logo">👑</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">AI Jastip — Event Kita Kita</div>
    <input class="login-input" id="pinInput" type="password" placeholder="••••" maxlength="6" id="pinEnter"/>
    <button class="login-btn" id="loginBtn">Masuk Admin 🔑</button>
    <div class="conn-info" id="connInfo">🔄 Menghubungkan ke Firebase...</div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted)">PIN: 1234</div>
  </div>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <div class="admin-header">
    <div><div class="admin-title">📋 Admin Panel</div><div class="admin-sub">Event Kita Kita — AI Jastip</div></div>
    <div class="live-row"><div class="live-dot"></div><div class="live-txt">LIVE</div></div>
  </div>
  <div class="timer-section">
    <div class="timer-top">
      <div>
        <div class="timer-display ok" id="timerDisplay">00:00</div>
        <div class="timer-lbl" id="timerLbl">Atur timer pemesanan</div>
      </div>
      <div class="timer-btns">
        <button class="t-btn" onclick="setTimer(10)">+10m</button>
        <button class="t-btn" onclick="setTimer(20)">+20m</button>
        <button class="t-btn" onclick="setTimer(30)">+30m</button>
        <button class="t-btn" onclick="setTimer(60)">+60m</button>
        <button class="t-btn red" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>
  <div class="admin-body" id="adminBody"></div>
</div>

<script>
const FB_URL='https://jastip-73b53-default-rtdb.asia-southeast1.firebasedatabase.app';
const ADMIN_PIN='1234';
const rp=n=>"Rp "+n.toLocaleString('id-ID');

let fbState={open:true,timerEnd:null};
let fbOrders=[];
let timerIv=null;

// ══ FIREBASE ══
async function fbGet(path){
  try{const r=await fetch(FB_URL+path+'.json');return await r.json();}catch(e){return null;}
}
async function fbSet(path,data){
  try{await fetch(FB_URL+path+'.json',{method:'PUT',body:JSON.stringify(data)});return true;}catch(e){return false;}
}

async function loadAll(){
  try{
    const state=await fbGet('/state');
    if(state&&typeof state==='object'){fbState={open:state.open!==false,timerEnd:state.timerEnd||null};}
    const orders=await fbGet('/orders');
    if(!orders||typeof orders!=='object'){fbOrders=[];return;}
    fbOrders=Object.values(orders).filter(o=>o&&o.name&&o.items&&o.total);
  }catch(e){console.error('loadAll error:',e);}
}

async function adminLogin(){
  const inp=document.getElementById('pinInput')||document.getElementById('pinEnter');
  const pin=inp?inp.value:'';
  if(pin!==ADMIN_PIN){
    const inpEl=document.getElementById('pinInput')||document.getElementById('pinEnter');
    if(inpEl){inpEl.style.borderColor='var(--red)';inpEl.value='';}
    setTimeout(()=>{if(inpEl)inpEl.style.borderColor='';},1000);return;
  }
  document.getElementById('connInfo').textContent='🔄 Memuat data...';
  await loadAll();
  showPage('page-admin');
  renderAdmin();
  startTimerTick();
  startPolling();
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══ POLLING ══
function startPolling(){
  setInterval(async()=>{
    await loadAll();
    if(document.getElementById('page-admin').classList.contains('active')) renderAdmin();
  },4000);
}

// ══ TIMER ══
async function setTimer(mins){
  const newEnd=Date.now()+(Math.min(mins,60)*60000);
  fbState.timerEnd=newEnd;
  await fbSet('/state',fbState);
}
async function resetTimer(){
  fbState.timerEnd=null;
  await fbSet('/state',fbState);
  const d=document.getElementById('timerDisplay');
  d.textContent='00:00'; d.className='timer-display ok';
  document.getElementById('timerLbl').textContent='Atur timer pemesanan';
}

function startTimerTick(){
  if(timerIv) clearInterval(timerIv);
  timerIv=setInterval(doTimerTick,1000);
  doTimerTick();
}
function doTimerTick(){
  const d=document.getElementById('timerDisplay');
  const l=document.getElementById('timerLbl');
  if(!d) return;
  const end=fbState.timerEnd;
  if(!end){d.textContent='00:00';d.className='timer-display ok';l.textContent='Atur timer pemesanan';return;}
  const rem=end-Date.now();
  if(rem<=0){d.textContent='⏰ HABIS';d.className='timer-display danger';l.textContent='Waktu pemesanan habis!';return;}
  const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
  d.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  d.className='timer-display '+(rem<60000?'danger':rem<300000?'warn':'ok');
  l.textContent='Sisa waktu pemesanan';
}

// ══ RENDER ══
function renderAdmin(){
  const body=document.getElementById('adminBody');
  const total=fbOrders.reduce((a,o)=>a+o.total,0);
  const totalItems=fbOrders.reduce((a,o)=>a+o.items.reduce((b,i)=>b+i.qty,0),0);
  let html='';

  html+=`<div class="${fbState.open?'status-bar status-open':'status-bar status-closed'}">${fbState.open?'🟢 Pemesanan Sedang BUKA':'🔴 Pemesanan Sedang DITUTUP'}</div>`;

  html+=`<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${fbOrders.length}</div><div class="stat-lbl">Pemesan</div></div>
    <div class="stat-card"><div class="stat-val">${totalItems}</div><div class="stat-lbl">Total Item</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:13px;color:var(--green)">${fbOrders.length>0?fbOrders[fbOrders.length-1].time:'-'}</div><div class="stat-lbl">Terakhir</div></div>
  </div>`;

  html+=`<div class="grand-total"><div class="gt-lbl">💰 Grand Total (${fbOrders.length} orang)</div><div class="gt-val">${rp(total)}</div></div>`;

  if(fbOrders.length>0){
    html+=`<div class="sec-title">📋 Daftar Pesanan</div>`;
    fbOrders.forEach(o=>{
      const pc=o.payment.toLowerCase().includes('dana')?'pay-dana':o.payment.toLowerCase().includes('bsi')?'pay-bsi':o.payment.toLowerCase().includes('shopee')?'pay-shopee':'pay-cash';
      html+=`<div class="order-card">
        <div class="order-top"><div><div class="order-name">${o.name}</div><div class="order-time">${o.time}</div></div><span class="pay-badge ${pc}">${o.payment}</span></div>
        <div class="order-items">${o.items.map(i=>`• ${i.name} x${i.qty} — ${rp(i.price*i.qty)}`).join('<br>')}</div>
        <div class="order-subtotal"><span>Subtotal</span><span>${rp(o.total)}</span></div>
      </div>`;
    });
  } else {
    html+=`<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">📋</div><div>Belum ada pesanan masuk</div></div>`;
  }

  html+=`<div class="sec-title">⚙️ Kontrol</div>
  <div class="actions">
    <button class="act-btn btn-wa" onclick="kirimWA()">📤 Kirim Rekap ke WA</button>
    <button class="act-btn btn-excel" onclick="exportExcel()">📊 Export Spreadsheet (.xlsx)</button>
    <button class="act-btn ${fbState.open?'btn-close':'btn-open'}" onclick="toggleOpen()">${fbState.open?'🔴 Tutup Pemesanan':'🟢 Buka Pemesanan'}</button>
    <button class="act-btn btn-reset" onclick="resetOrders()">🔄 Reset Semua Pesanan</button>
  </div>`
  <div class="logout-btn" onclick="logout()">Keluar dari Admin</div>
  <div style="height:16px"></div>`;

  body.innerHTML=html;
}

async function toggleOpen(){
  fbState.open=!fbState.open;
  await fbSet('/state',fbState);
  renderAdmin();
}

async function resetOrders(){
  if(!confirm('Reset semua pesanan? Tidak bisa dibatalkan!')) return;
  await fbSet('/orders',{});
  fbOrders=[];
  renderAdmin();
}

function kirimWA(){
  if(!fbOrders.length){alert('Belum ada pesanan!');return;}
  const total=fbOrders.reduce((a,o)=>a+o.total,0);
  let txt=`🍱 *REKAP PESANAN JASTIP*\n_Event Kita Kita — ${new Date().toLocaleDateString('id-ID')}_\n\n`;
  fbOrders.forEach((o,i)=>{
    txt+=`${i+1}. *${o.name}*\n`;
    o.items.forEach(it=>txt+=`   • ${it.name} x${it.qty} — ${rp(it.price*it.qty)}\n`);
    txt+=`   Bayar: ${o.payment} | Total: *${rp(o.total)}*\n\n`;
  });
  txt+=`━━━━━━━━━━━━━━\n💰 *GRAND TOTAL: ${rp(total)}*\n(${fbOrders.length} orang)`;
  window.open('https://wa.me/?text='+encodeURIComponent(txt));
}

function exportExcel(){
  if(!fbOrders.length){alert('Belum ada pesanan!');return;}
  const total=fbOrders.reduce((a,o)=>a+o.total,0);
  const tanggal=new Date().toLocaleDateString('id-ID');
  const waktu=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  // Build CSV with BOM for Excel compatibility
  let csv='﻿';
  csv+='REKAP PESANAN JASTIP — Event Kita Kita\n';
  csv+=`Tanggal: ${tanggal} ${waktu}\n`;
  csv+=`Total Pemesan: ${fbOrders.length} orang\n\n`;

  // Header
  csv+='No,Nama,Menu,Qty,Harga Satuan,Subtotal,Metode Bayar,Waktu Pesan\n';

  let no=1;
  fbOrders.forEach(o=>{
    o.items.forEach((it,idx)=>{
      csv+=`${idx===0?no:''},`;
      csv+=`${idx===0?o.name:''},`;
      csv+=`"${it.name}",`;
      csv+=`${it.qty},`;
      csv+=`${it.price},`;
      csv+=`${it.price*it.qty},`;
      csv+=`${idx===0?o.payment:''},`;
      csv+=`${idx===0?o.time:''}\n`;
    });
    // Subtotal row per person
    csv+=`,,,,,"${rp(o.total)}",,\n`;
    no++;
  });

  csv+='\n';
  csv+=`GRAND TOTAL,,,,,"${rp(total)}",,\n`;

  // Download
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`Rekap_Jastip_${tanggal.replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function logout(){showPage('page-login');document.getElementById('pinInput').value='';}

// Check connection on load
fbGet('/state').then(r=>{
  const ci=document.getElementById('connInfo');
  if(ci) ci.textContent=r!==null?'✅ Terhubung ke Firebase':'⚠️ Gagal terhubung, cek internet';
});

// Fix login button events
document.addEventListener('DOMContentLoaded', function(){
  const btn = document.getElementById('loginBtn');
  const inp = document.getElementById('pinInput') || document.getElementById('pinEnter');
  if(btn) btn.addEventListener('click', adminLogin);
  if(inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') adminLogin(); });
});
</script>
</body>
</html>
