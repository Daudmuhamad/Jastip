async function fbSet(path, data) {
  const r = await fetch(FB + path + '.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

function log(msg, type='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${type}">${msg}</span><br>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct, status) {
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('status').textContent = status;
}

async function startImport() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Importing...';

  const allDates = Object.keys(DATA);
  const totalOrders = allDates.reduce((a,d) => a + DATA[d].length, 0);
  let done = 0, ok = 0, fail = 0;

  log('🚀 Mulai import ' + totalOrders + ' orders...', 'info');

  for (const date of allDates) {
    log('📅 ' + date + ' — ' + DATA[date].length + ' orang', 'info');
    for (const order of DATA[date]) {
      try {
        const orderData = {...order, date, key: undefined};
        delete orderData.key;
        await fbSet('/history/' + date + '/orders/' + order.key, orderData);
        log('  ✅ ' + order.name + ' — Rp ' + order.total.toLocaleString('id-ID'), 'ok');
        ok++;
      } catch(e) {
        log('  ❌ GAGAL: ' + order.name + ' — ' + e.message, 'err');
        fail++;
      }
      done++;
      setProgress(Math.round(done/totalOrders*100), done + '/' + totalOrders + ' orders');
      await new Promise(r => setTimeout(r, 80));
    }
  }

  setProgress(100, 'Selesai!');
  log('', '');
  log('═══════════════════════', 'info');
  log('✅ Berhasil: ' + ok + ' orders', 'ok');
  if (fail > 0) log('❌ Gagal: ' + fail + ' orders', 'err');
  log('📊 Buka link statistik untuk lihat data!', 'info');

  btn.textContent = ok === totalOrders ? '✅ Import Selesai!' : '⚠️ Ada yang Gagal';
  btn.style.background = ok === totalOrders ? '#22c55e' : '#ef4444';
  btn.style.color = '#fff';
}
