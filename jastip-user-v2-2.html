<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Jastip — Pesan Makan Siang</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--gold:#F5A623;--bg:#0d0d0d;--card:#181818;--card2:#202020;--border:#2c2c2c;--text:#f0f0f0;--muted:#777;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;}
.page{display:none;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;}
.page.active{display:flex;}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;background:radial-gradient(ellipse at top,rgba(245,166,35,.1) 0%,transparent 60%),var(--bg);overflow-y:auto;}
.login-logo{font-size:50px;margin-bottom:12px;}
.login-title{font-size:26px;font-weight:800;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.login-input{width:100%;max-width:320px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;margin-bottom:12px;outline:none;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;max-width:320px;background:var(--gold);color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.login-btn:active{opacity:.8;}

/* MAIN LAYOUT - 2 baris */
.main-header{background:#111;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.main-av{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.main-hdr-name{font-size:13px;font-weight:800;}
.main-hdr-sub{font-size:10px;color:var(--green);}
.main-hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.cart-badge{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);color:var(--gold);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;}

/* TIMER BAR */
.timer-bar{background:var(--card2);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.timer-left{display:flex;align-items:center;gap:8px;}
.timer-icon{font-size:14px;}
.timer-lbl{font-size:11px;color:var(--muted);}
.timer-val{font-size:15px;font-weight:800;letter-spacing:1px;}
.timer-val.ok{color:var(--green);}
.timer-val.warn{color:var(--gold);}
.timer-val.danger{color:var(--red);}
.timer-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.timer-status.open{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.timer-status.closed{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}

/* 2 COLUMN LAYOUT */
.two-col{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.col-divider{width:1px;background:var(--border);flex-shrink:0;}

/* LEFT - MENU */
.col-menu{display:flex;flex-direction:column;overflow:hidden;}
.col-title{background:#111;padding:8px 12px;font-size:10px;font-weight:800;color:var(--gold);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0;}
.menu-scroll{flex:1;overflow-y:auto;padding:8px;}
.menu-cat-title{font-size:9px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;padding:8px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px;}
.menu-grid{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.menu-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.menu-item-name{font-size:11px;font-weight:600;line-height:1.3;}
.menu-item-price{font-size:10px;color:var(--gold);font-weight:700;margin-top:1px;}
.add-btn{width:26px;height:26px;border-radius:50%;background:var(--gold);border:none;color:#000;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:11px;font-weight:800;min-width:16px;text-align:center;color:var(--gold);}

/* MENU FOOTER */
.menu-footer{flex-shrink:0;background:#111;border-top:1px solid var(--border);padding:8px;}
.checkout-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:11px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:space-between;}
.checkout-btn:disabled{opacity:.35;cursor:default;}

/* RIGHT - REKAP */
.col-rekap{display:flex;flex-direction:column;overflow:hidden;}
.rekap-scroll{flex:1;overflow-y:auto;padding:8px;}
.rekap-summary{background:var(--card);border:1px solid rgba(245,166,35,.3);border-radius:10px;padding:10px;margin-bottom:10px;}
.rekap-summary-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.rekap-summary-total{font-size:13px;font-weight:800;color:var(--gold);padding-top:6px;border-top:1px solid var(--border);margin-top:4px;display:flex;justify-content:space-between;}
.rekap-sec-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.rekap-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:6px;}
.rekap-card-name{font-size:12px;font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.rekap-pay{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
.pay-dana{background:rgba(96,165,250,.2);color:#60a5fa;}
.pay-bsi{background:rgba(34,197,94,.15);color:var(--green);}
.pay-cash{background:rgba(245,166,35,.15);color:var(--gold);}
.pay-shopeepay{background:rgba(255,80,80,.2);color:#ff5050;}
.rekap-items{font-size:10px;color:#bbb;line-height:1.7;}
.rekap-subtotal{font-size:11px;font-weight:800;color:var(--gold);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);text-align:right;}
.empty-rekap{text-align:center;padding:24px 10px;color:var(--muted);font-size:11px;}

/* PAYMENT PAGE */
.pay-header{background:#111;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.pay-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;}
.sec-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.order-summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.order-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);gap:10px;}
.order-row:last-child{border-bottom:none;font-weight:800;color:var(--gold);padding-top:10px;font-size:14px;}
.order-row span:first-child{color:#ccc;}
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pay-method{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.pay-method.selected{border-color:var(--gold);background:rgba(245,166,35,.08);}
.pay-method:active{opacity:.8;}
.pay-method-icon{font-size:24px;margin-bottom:6px;}
.pay-method-name{font-size:13px;font-weight:700;}
.confirm-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.confirm-btn:disabled{opacity:.35;cursor:default;}

/* DONE PAGE */
.done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center;overflow-y:auto;}
.done-icon{font-size:56px;margin-bottom:12px;}
.done-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.done-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.done-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;width:100%;max-width:340px;margin-bottom:14px;text-align:left;}
.done-card-title{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.done-item{font-size:13px;padding:4px 0;display:flex;justify-content:space-between;gap:8px;color:#ccc;}
.done-total{font-size:14px;font-weight:800;color:var(--gold);padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;margin-top:6px;}
.done-pay-info{font-size:11px;color:var(--muted);margin-top:6px;}
.wa-btn{background:#25D366;color:#000;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:10px;width:100%;max-width:340px;}
.new-order-btn{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;width:100%;max-width:340px;}
.closed-banner{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px;text-align:center;font-size:12px;color:var(--red);font-weight:700;margin-bottom:8px;line-height:1.5;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="page active" id="page-login">
  <div class="login-wrap">
    <div class="login-logo">🍱</div>
    <div class="login-title">AI <span style="color:var(--gold)">Jastip</span></div>
    <div class="login-sub">Pesan makan siang otomatis<br>Event Kita Kita</div>
    <input class="login-input" id="nameInput" placeholder="Masukkan nama kamu..." maxlength="30" onkeydown="if(event.key==='Enter')startOrder()"/>
    <button class="login-btn" onclick="startOrder()">Lihat Menu & Pesan 🍽️</button>
  </div>
</div>

<!-- MAIN (2 kolom) -->
<div class="page" id="page-main">
  <div class="main-header">
    <div class="main-av">🍱</div>
    <div>
      <div class="main-hdr-name">AI Jastip</div>
      <div class="main-hdr-sub" id="mainStatus">● Buka — Event Kita Kita</div>
    </div>
    <div class="main-hdr-right">
      <div class="cart-badge" id="cartBadge" onclick="goCheckout()">🛒 0 item</div>
    </div>
  </div>

  <!-- TIMER BAR -->
  <div class="timer-bar">
    <div class="timer-left">
      <div class="timer-icon">⏱️</div>
      <div>
        <div class="timer-lbl">Sisa waktu pesan</div>
        <div class="timer-val ok" id="timerVal">--:--</div>
      </div>
    </div>
    <div class="timer-status open" id="timerStatus">🟢 Buka</div>
  </div>

  <!-- 2 COLUMNS -->
  <div class="two-col">
    <!-- KIRI: MENU -->
    <div class="col-menu">
      <div class="col-title">🍽️ Pilih Menu</div>
      <div class="menu-scroll" id="menuBody"></div>
      <div class="menu-footer">
        <button class="checkout-btn" id="checkoutBtn" onclick="goCheckout()" disabled>
          <span>Pesan</span>
          <span id="checkoutTotal">Rp 0</span>
        </button>
      </div>
    </div>

    <div class="col-divider"></div>

    <!-- KANAN: REKAP -->
    <div class="col-rekap">
      <div class="col-title">📋 Rekap Semua</div>
      <div class="rekap-scroll" id="rekapBody"></div>
    </div>
  </div>
</div>

<!-- PAYMENT -->
<div class="page" id="page-payment">
  <div class="pay-header">
    <button class="back-btn" onclick="showPage('page-main')">← Kembali</button>
    <span style="font-size:14px;font-weight:700;margin-left:8px;">Konfirmasi Pesanan</span>
  </div>
  <div class="pay-body">
    <div>
      <div class="sec-title">📋 Ringkasan Pesanan</div>
      <div class="order-summary" id="orderSummary"></div>
    </div>
    <div>
      <div class="sec-title">💳 Metode Pembayaran</div>
      <div class="pay-methods">
        <div class="pay-method" onclick="selectPay('Dana')" id="pay-Dana"><div class="pay-method-icon">💙</div><div class="pay-method-name">Dana</div></div>
        <div class="pay-method" onclick="selectPay('BSI')" id="pay-BSI"><div class="pay-method-icon">🟢</div><div class="pay-method-name">BSI</div></div>
        <div class="pay-method" onclick="selectPay('Shopeepay')" id="pay-Shopeepay"><div class="pay-method-icon">🧡</div><div class="pay-method-name">Shopeepay</div></div>
        <div class="pay-method" onclick="selectPay('Cash')" id="pay-Cash"><div class="pay-method-icon">💵</div><div class="pay-method-name">Cash</div></div>
      </div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmOrder()" disabled>✅ Konfirmasi Pesanan</button>
    <div style="height:10px"></div>
  </div>
</div>

<!-- DONE -->
<div class="page" id="page-done">
  <div class="done-wrap">
    <div class="done-icon">🎉</div>
    <div class="done-title">Pesanan Masuk!</div>
    <div class="done-sub" id="doneMsg">Pesananmu sudah tercatat!</div>
    <div class="done-card" id="doneCard"></div>
    <button class="wa-btn" onclick="kirimWA()">📤 Kirim ke WA Admin</button>
    <button class="new-order-btn" onclick="backToMain()">← Lihat Rekap</button>
  </div>
</div>

const rp = n => "Rp " + n.toLocaleString('id-ID');
let userName = '';
let cart = {};
let selectedPay = '';
let timerInterval = null;

function getState() {
  try { return JSON.parse(localStorage.getItem('jastip_state') || '{}'); } catch(e) { return {}; }
}
function getIsOpen() { const s = getState(); return s.open !== false; }
function getOrders() {
  try { return JSON.parse(localStorage.getItem('jastip_orders') || '[]'); } catch(e) { return []; }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startOrder() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  userName = name;
  cart = {};
  showPage('page-main');
  renderMenu();
  renderRekap();
  startTimerTick();
}

// ── TIMER ──
function startTimerTick() {
  if (timerInterval) clearInterval(timerInterval);
  timerTick();
  timerInterval = setInterval(timerTick, 1000);
}

function timerTick() {
  const s = getState();
  const open = s.open !== false;
  const timerEnd = s.timerEnd || null;
  const valEl = document.getElementById('timerVal');
  const statusEl = document.getElementById('timerStatus');
  const mainStatus = document.getElementById('mainStatus');

  if (!open) {
    valEl.textContent = 'TUTUP';
    valEl.className = 'timer-val danger';
    statusEl.textContent = '🔴 Ditutup';
    statusEl.className = 'timer-status closed';
    mainStatus.textContent = '● Ditutup';
    mainStatus.style.color = 'var(--red)';
    return;
  }

  mainStatus.textContent = '● Buka — Event Kita Kita';
  mainStatus.style.color = 'var(--green)';
  statusEl.textContent = '🟢 Buka';
  statusEl.className = 'timer-status open';

  if (!timerEnd) {
    valEl.textContent = '--:--';
    valEl.className = 'timer-val ok';
    return;
  }

  const remaining = timerEnd - Date.now();
  if (remaining <= 0) {
    valEl.textContent = '⏰ Habis';
    valEl.className = 'timer-val danger';
    return;
  }
  const m = Math.floor(remaining / 60000);
  const sec = Math.floor((remaining % 60000) / 1000);
  valEl.textContent = String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  valEl.className = 'timer-val ' + (remaining < 60000 ? 'danger' : remaining < 300000 ? 'warn' : 'ok');
}

// ── MENU ──
function renderMenu() {
  const body = document.getElementById('menuBody');
  const open = getIsOpen();

  if (!open) {
    body.innerHTML = '<div class="closed-banner">🔴 Pemesanan ditutup sementara.<br>Silakan tunggu! 🙏</div>';
    document.getElementById('checkoutBtn').disabled = true;
    return;
  }

  const cats = [...new Set(MENU.map(m => m.cat))];
  let html = `<div style="padding:4px 0 8px;font-size:11px;color:var(--muted)">Halo <b style="color:var(--text)">${userName}</b>! Tap + untuk pilih 😊</div>`;
  cats.forEach(cat => {
    const items = MENU.filter(m => m.cat === cat);
    html += `<div class="menu-cat-title">${cat}</div><div class="menu-grid">`;
    items.forEach(m => {
      const qty = cart[m.id] || 0;
      html += `<div class="menu-item">
        <div style="flex:1;min-width:0;">
          <div class="menu-item-name">${m.name}</div>
          <div class="menu-item-price">${rp(m.price)}</div>
        </div>
        <div id="ctrl-${m.id}">${renderCtrl(m.id, qty)}</div>
      </div>`;
    });
    html += '</div>';
  });
  body.innerHTML = html;
  updateCartUI();
}

function renderCtrl(id, qty) {
  if (qty === 0) return `<button class="add-btn" onclick="addItem(${id})">+</button>`;
  return `<div class="qty-ctrl">
    <button class="qty-btn" onclick="removeItem(${id})">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" style="background:var(--gold);color:#000;border-color:var(--gold)" onclick="addItem(${id})">+</button>
  </div>`;
}

function addItem(id) {
  cart[id] = (cart[id] || 0) + 1;
  const el = document.getElementById('ctrl-' + id);
  if (el) el.innerHTML = renderCtrl(id, cart[id]);
  updateCartUI();
}
function removeItem(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] === 0) delete cart[id];
  const el = document.getElementById('ctrl-' + id);
  if (el) el.innerHTML = renderCtrl(id, cart[id] || 0);
  updateCartUI();
}
function updateCartUI() {
  const ids = Object.keys(cart);
  const totalQty = ids.reduce((a, id) => a + cart[id], 0);
  const totalPrice = ids.reduce((a, id) => {
    const m = MENU.find(x => x.id === parseInt(id));
    return a + (m ? m.price * cart[id] : 0);
  }, 0);
  document.getElementById('cartBadge').textContent = '🛒 ' + totalQty + ' item';
  document.getElementById('checkoutBtn').disabled = totalQty === 0 || !getIsOpen();
  document.getElementById('checkoutTotal').textContent = rp(totalPrice);
}

// ── REKAP ──
function renderRekap() {
  const body = document.getElementById('rekapBody');
  const orders = getOrders();
  const grandTotal = orders.reduce((a, o) => a + o.total, 0);
  const totalPax = orders.length;

  if (orders.length === 0) {
    body.innerHTML = '<div class="empty-rekap">📋<br><br>Belum ada pesanan</div>';
    return;
  }

  let html = `<div class="rekap-summary">
    <div class="rekap-summary-row"><span style="color:var(--muted)">Total Pemesan</span><span style="font-weight:700">${totalPax} orang</span></div>
    <div class="rekap-summary-total"><span>Grand Total</span><span>${rp(grandTotal)}</span></div>
  </div>
  <div class="rekap-sec-title">Daftar Pesanan</div>`;

  orders.forEach(o => {
    const pc = o.payment.toLowerCase().includes('dana') ? 'pay-dana' :
               o.payment.toLowerCase().includes('bsi') ? 'pay-bsi' :
               o.payment.toLowerCase().includes('shopee') ? 'pay-shopeepay' : 'pay-cash';
    html += `<div class="rekap-card">
      <div class="rekap-card-name">
        <span>${o.name}</span>
        <span class="rekap-pay ${pc}">${o.payment}</span>
      </div>
      <div class="rekap-items">${o.items.map(i => `• ${i.name} x${i.qty}`).join('<br>')}</div>
      <div class="rekap-subtotal">${rp(o.total)}</div>
    </div>`;
  });

  body.innerHTML = html;
}

// ── CHECKOUT ──
function goCheckout() {
  const ids = Object.keys(cart);
  if (ids.length === 0) return;
  selectedPay = '';
  document.querySelectorAll('.pay-method').forEach(el => el.classList.remove('selected'));
  document.getElementById('confirmBtn').disabled = true;

  let html = '', total = 0;
  ids.forEach(id => {
    const m = MENU.find(x => x.id === parseInt(id));
    if (!m) return;
    const sub = m.price * cart[id];
    total += sub;
    html += `<div class="order-row"><span>${m.name} x${cart[id]}</span><span style="font-weight:700;color:var(--text)">${rp(sub)}</span></div>`;
  });
  html += `<div class="order-row"><span>Total</span><span>${rp(total)}</span></div>`;
  document.getElementById('orderSummary').innerHTML = html;
  showPage('page-payment');
}

function selectPay(method) {
  selectedPay = method;
  document.querySelectorAll('.pay-method').forEach(el => el.classList.remove('selected'));
  document.getElementById('pay-' + method).classList.add('selected');
  document.getElementById('confirmBtn').disabled = false;
}

function confirmOrder() {
  if (!selectedPay) return;
  const items = Object.keys(cart).map(id => {
    const m = MENU.find(x => x.id === parseInt(id));
    return {id:parseInt(id), name:m.name, qty:cart[id], price:m.price};
  });
  const total = items.reduce((a,i) => a + i.price*i.qty, 0);
  const time = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  let orders = getOrders();
  orders = orders.filter(o => o.name.toLowerCase() !== userName.toLowerCase());
  orders.push({name:userName, items, total, payment:selectedPay, time});
  localStorage.setItem('jastip_orders', JSON.stringify(orders));

  let cardHtml = `<div class="done-card-title">Pesanan ${userName}</div>`;
  items.forEach(i => { cardHtml += `<div class="done-item"><span>${i.name} x${i.qty}</span><span>${rp(i.price*i.qty)}</span></div>`; });
  cardHtml += `<div class="done-total"><span>Total</span><span>${rp(total)}</span></div>`;
  cardHtml += `<div class="done-pay-info">Bayar: <b style="color:var(--text)">${selectedPay}</b> &nbsp;•&nbsp; ${time}</div>`;
  document.getElementById('doneCard').innerHTML = cardHtml;
  document.getElementById('doneMsg').textContent = 'Pesanan ' + userName + ' sudah tercatat! 🎉';
  showPage('page-done');
}

function kirimWA() {
  const orders = getOrders();
  const my = orders.find(o => o.name.toLowerCase() === userName.toLowerCase());
  if (!my) return;
  let txt = `🍱 *PESANAN JASTIP*\n_Event Kita Kita_\n\n👤 *${my.name}*\n`;
  my.items.forEach(i => txt += `• ${i.name} x${i.qty} — ${rp(i.price*i.qty)}\n`);
  txt += `\n💰 Total: *${rp(my.total)}*\n💳 Bayar: *${my.payment}*`;
  window.open('https://wa.me/' + ADMIN_WA + '?text=' + encodeURIComponent(txt));
}

function backToMain() {
  cart = {};
  showPage('page-main');
  renderMenu();
  renderRekap();
}

// Auto refresh rekap & timer setiap 4 detik
setInterval(() => {
  if (document.getElementById('page-main').classList.contains('active')) {
    renderRekap();
    timerTick();
    updateCartUI();
  }
}, 4000);
</script>
</body>
</html>
