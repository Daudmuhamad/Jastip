<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code – AI Jastip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:sans-serif;
  background:#0d0d0d;
  color:#f0ece4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
}
.card{
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:20px;
  padding:30px 24px;
  text-align:center;
  max-width:360px;
  width:100%;
}
.logo{font-size:48px;margin-bottom:12px;}
h1{
  font-size:22px;font-weight:800;
  color:#f5a623;margin-bottom:4px;
}
.sub{font-size:13px;color:#666;margin-bottom:24px;}
#qrcode{
  display:flex;justify-content:center;
  margin-bottom:20px;
}
#qrcode canvas, #qrcode img{
  border-radius:12px;
  border:4px solid #f5a623;
  padding:8px;
  background:white;
}
.link-box{
  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:10px 14px;
  font-size:11px;
  color:#888;
  word-break:break-all;
  margin-bottom:16px;
}
.info{
  font-size:12px;color:#555;
  line-height:1.7;
  margin-bottom:20px;
}
.btn-download{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#f5a623,#ff6b35);
  color:#000;border:none;border-radius:10px;
  font-size:14px;font-weight:800;
  cursor:pointer;margin-bottom:10px;
}
.btn-open{
  width:100%;padding:12px;
  background:#1e1e1e;
  color:#f5a623;
  border:1px solid #f5a623;
  border-radius:10px;
  font-size:14px;font-weight:700;
  cursor:pointer;text-decoration:none;
  display:block;
}
.status{
  margin-top:16px;
  padding:10px;
  border-radius:10px;
  font-size:12px;font-weight:700;
  background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.3);
  color:#22C55E;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">🍱</div>
  <h1>AI Jastip</h1>
  <div class="sub">Event Kita Kita • Scan untuk pesan!</div>

  <div id="qrcode"></div>

  <div class="link-box" id="link-text">daudmuhamad.github.io/Jastip/jastip_USER-1.html</div>

  <div class="info">
    📱 Scan QR di atas pakai kamera HP<br>
    atau klik tombol di bawah untuk buka langsung
  </div>

  <button class="btn-download" onclick="downloadQR()">⬇️ Download QR Code</button>
  <a class="btn-open" href="https://daudmuhamad.github.io/Jastip/jastip_USER-1.html" target="_blank">🔗 Buka Link Pemesanan</a>

  <div class="status">🟢 Scan & langsung pesan!</div>
  <div style="margin-top:16px;font-size:13px;color:#888;line-height:1.7;padding:12px;background:#111;border-radius:10px;border:1px solid #2a2a2a;">
    📢 Silakan scan untuk teman-teman<br><b style="color:#f5a623;">Event Kita Kita</b> yang mau jastip 😊🙏
  </div>
</div>

<script>
const URL_PESAN = "https://daudmuhamad.github.io/Jastip/jastip_USER-1.html";

const qr = new QRCode(document.getElementById("qrcode"), {
  text: URL_PESAN,
  width: 220,
  height: 220,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});

function downloadQR(){
  setTimeout(()=>{
    const canvas = document.querySelector("#qrcode canvas");
    if(canvas){
      const link = document.createElement("a");
      link.download = "QR_AI_Jastip.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  }, 100);
}
</script>
</body>
</html>
