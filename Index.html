<head>

<title>AI Jastip – Event Kita Kita</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0d0d0d;color:#f0ece4;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.tab-nav{width:100%;max-width:520px;display:flex;padding:10px 12px 0;gap:8px;background:#0d0d0d;position:sticky;top:0;z-index:20;}
.tab-btn{flex:1;padding:9px 0;border-radius:10px 10px 0 0;border:1px solid #2a2a2a;border-bottom:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;background:#1e1e1e;color:#555;}
.tab-btn.active{color:#f5a623;border-color:#f5a623;}
.page{width:100%;max-width:520px;display:none;flex-direction:column;}
.page.show{display:flex;}
#chat-area{width:100%;padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;height:calc(100vh - 210px);}
.msg{display:flex;}.msg.user{justify-content:flex-end;}
.bubble{max-width:84%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;}
.bubble.user{background:#f5a623;color:#000;border-bottom-right-radius:3px;font-weight:600;}
.bubble.bot{background:#1e1e1e;color:#f0ece4;border:1px solid #2a2a2a;border-bottom-left-radius:3px;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:12px;width:100%;}
.mcat{font-weight:800;font-size:11px;color:#f5a623;margin:10px 0 5px;}.mcat:first-child{margin-top:0;}
.mitem{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid #222;}.mitem:last-child{border-bottom:none;}
.mprice{color:#f5a623;font-weight:700;margin-left:8px;white-space:nowrap;}
.pay-opt{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;border:1px solid #2a2a2a;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.pay-opt:last-child{margin-bottom:0;}.pay-opt:hover,.pay-opt.dipilih{border-color:#f5a623;background:rgba(245,166,35,.08);}
.pay-opt.blur{opacity:.3;pointer-events:none;}
.ritem{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px solid #222;}.ritem:last-child{border-bottom:none;}
.rtotal{display:flex;justify-content:space-between;font-weight:800;font-size:14px;color:#f5a623;margin-top:9px;}
.rpay{margin-top:8px;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.25);border-radius:8px;padding:7px 11px;font-size:12px;color:#4caf82;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;padding:11px;border-radius:10px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-size:13px;font-weight:700;text-decoration:none;}
.wa-btn svg{width:17px;height:17px;fill:#fff;flex-shrink:0;}
.qr-row{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 6px;width:100%;max-width:520px;}
.qr-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#f0ece4;padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;}
.qr-btn:hover{border-color:#f5a623;color:#f5a623;}
.input-row{width:100%;max-width:520px;padding:8px 14px 16px;display:flex;gap:8px;align-items:center;}
#user-input{flex:1;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:22px;padding:11px 16px;color:#f0ece4;font-family:inherit;font-size:13px;outline:none;}
#user-input:focus{border-color:#f5a623;}#user-input::placeholder{color:#444;}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#f5a623,#ff6b35);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rekap-page{width:100%;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:calc(100vh - 100px);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:11px;text-align:center;}
.grand-box{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(255,107,53,.07));border:1px solid rgba(245,166,35,.3);border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;}
.action-row{display:flex;gap:8px;}
.btn-wa{flex:1;padding:11px;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;}
.timer-box{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:11px;text-align:center;font-size:12px;color:#555;font-weight:600;transition:all .3s;}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;}
.f-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#555;padding:5px 12px;border-radius:16px;font-size:11.5px;cursor:pointer;font-family:inherit;}
.f-btn.on{border-color:#f5a623;color:#f5a623;}
.order-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px;margin-bottom:10px;}
.nbadge{width:24px;height:24px;background:#f5a623;color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.pay-tag{font-size:11px;padding:3px 10px;border-radius:16px;font-weight:600;}
.empty{text-align:center;padding:50px 20px;color:#444;}
.sync-bar{background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.2);border-radius:10px;padding:8px 12px;font-size:11px;color:#4caf82;text-align:center;}
.sync-bar.err{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.2);color:#e74c3c;}
</style>
</head>
<body>

<div class="page" id="page-rekap">

    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:40px;height:40px;background:linear-gradient(135deg,#f5a623,#ff6b35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;">📋</div>
      <div><div style="font-weight:800;font-size:17px;">Rekap Pesanan</div><div style="font-size:11px;color:#555;">🟢 AI Jastip – Event Kita Kita</div></div>
      <button onclick="syncCloud()" style="margin-left:auto;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;">🔄</button>
    </div>
    <div id="sync-status" class="sync-bar" style="display:none"></div>

      <button class="btn-wa" onclick="sendWA()">📤 Kirim ke WA</button>

    </div>

    <div id="order-list"></div>

</div>

<script>
// ══ GOOGLE APPS SCRIPT URL ══
const GAS = "https://script.google.com/macros/s/AKfycbxXidgjoPEoCoeTenorAnTbK2V9le7e5MTYtw_AcS873yvkh_g_pbscVVczjjvLWJwT/exec";
const DURASI = 60*60*1000;
const WA_ADMIN = "6287820645680";

// ══ DATA MENU ══
const KATEGORI = [
  {nama:"🍚 WARTEG",items:[
    {id:1,nama:"Nasi 1 Porsi",harga:5000,emoji:"🍚"},{id:2,nama:"Nasi 1/2 Porsi",harga:3000,emoji:"🍚"},
    {id:3,nama:"Ikan Tongkol",harga:5000,emoji:"🐟"},{id:4,nama:"Ayam Goreng",harga:8000,emoji:"🍗"},
    {id:5,nama:"Kikil",harga:5000,emoji:"🥩"},{id:6,nama:"Usus",harga:5000,emoji:"🍢"},
    {id:7,nama:"Orek Manis",harga:5000,emoji:"🫙"},{id:8,nama:"Orek Balado",harga:5000,emoji:"🌶️"},
    {id:9,nama:"Kentang Balado",harga:5000,emoji:"🥔"},{id:10,nama:"Tahu Udang",harga:5000,emoji:"🧆"},
    {id:11,nama:"Sayur Bayam",harga:5000,emoji:"🥬"},{id:12,nama:"Sayur Sop",harga:5000,emoji:"🥣"},
    {id:13,nama:"Sayur Kangkung",harga:5000,emoji:"🥬"},{id:14,nama:"Sayur Capcay",harga:5000,emoji:"🥦"},
    {id:15,nama:"Sayur Tahu Toge",harga:5000,emoji:"🌱"},
  ]},
  {nama:"🍱 NASPAD",items:[
    {id:16,nama:"Naspad Ayam Goreng",harga:13000,emoji:"🍗"},{id:17,nama:"Naspad Ayam Bakar",harga:13000,emoji:"🔥"},
    {id:18,nama:"Naspad Ayam Cabe Ijo",harga:13000,emoji:"🌿"},{id:19,nama:"Naspad Ayam Cabe Merah",harga:13000,emoji:"🌶️"},
    {id:20,nama:"Naspad Rendang",harga:13000,emoji:"🥩"},{id:21,nama:"Naspad Ikan Kembung Bakar",harga:13000,emoji:"🐟"},
    {id:22,nama:"Naspad Ikan Kembung Balado",harga:13000,emoji:"🐠"},
  ]},
  {nama:"🍜 MENU LAINNYA",items:[
    {id:23,nama:"Mie Ayam",harga:13000,emoji:"🍜"},{id:24,nama:"Bakso",harga:15000,emoji:"🍡"},
    {id:25,nama:"Pentol (kecil)",harga:5000,emoji:"🟤"},{id:26,nama:"Pentol (sedang)",harga:10000,emoji:"🟤"},
    {id:27,nama:"Pentol (besar)",harga:15000,emoji:"🟤"},{id:28,nama:"Tahu Crispy (kecil)",harga:5000,emoji:"🟨"},
    {id:29,nama:"Tahu Crispy (besar)",harga:10000,emoji:"🟨"},{id:30,nama:"Otak-Otak Crispy (kecil)",harga:5000,emoji:"🟧"},
    {id:31,nama:"Otak-Otak Crispy (besar)",harga:10000,emoji:"🟧"},{id:32,nama:"Tahu + Otak-Otak Crispy",harga:10000,emoji:"🍘"},
    {id:33,nama:"Cimol (kecil)",harga:5000,emoji:"⚪"},{id:34,nama:"Cimol (besar)",harga:10000,emoji:"⚪"},
    {id:35,nama:"Cilok (kecil)",harga:5000,emoji:"🔵"},{id:36,nama:"Cilok (besar)",harga:10000,emoji:"🔵"},
    {id:37,nama:"Gado-Gado",harga:15000,emoji:"🥗"},{id:38,nama:"Ketoprak",harga:15000,emoji:"🥗"},
    {id:39,nama:"Karedok",harga:15000,emoji:"🥗"},{id:40,nama:"Soto Ayam",harga:15000,emoji:"🍲"},
    {id:41,nama:"Soto Tangkar/Daging",harga:20000,emoji:"🍲"},
    {id:42,nama:"Ayam Geprek",harga:12000,emoji:"🌶️"},{id:43,nama:"Fried Chicken",harga:9000,emoji:"🍗"},
    {id:44,nama:"Kentang Mustofa",harga:5000,emoji:"🥔"},{id:45,nama:"Pecak Bandeng",harga:70000,emoji:"🐟"},
    {id:46,nama:"Combro (kecil)",harga:5000,emoji:"🟫"},{id:47,nama:"Combro (besar)",harga:10000,emoji:"🟫"},
    {id:48,nama:"Combro + Campur Gorengan",harga:10000,emoji:"🍘"},
  ]},
  {nama:"🥨 SNACK",items:[
    {id:49,nama:"Kerupuk Banyak",harga:5000,emoji:"🥨"},{id:50,nama:"Kerupuk Kaleng",harga:1000,emoji:"🥨"},
  ]},
  {nama:"🥤 MINUMAN",items:[
    {id:51,nama:"Es Kelapa",harga:5000,emoji:"🥥"},{id:52,nama:"Kelapa Muda",harga:12000,emoji:"🥥"},
    {id:53,nama:"Teh Poci",harga:5000,emoji:"🍵"},{id:54,nama:"Le Mineral 600ml",harga:5000,emoji:"💧"},
  ]}
];
const ALL_MENU = KATEGORI.flatMap(k=>k.items);
const BAYAR = [
  {id:"dana",icon:"💙",nama:"DANA",nomor:"087820645680"},
  {id:"bsi",icon:"🏦",nama:"BSI",nomor:"7189556955"},
  {id:"shopeepay",icon:"🧡",nama:"ShopeePay",nomor:"087820645680"},
  {id:"cash",icon:"💵",nama:"Cash",nomor:null},
];

// ══ STATE ══
// ORDERS disimpan di memory DAN dikirim ke GAS
let ORDERS = [];
let step="nama",nama="",pesanan=[],curMenu=null,orderFinal=null,dipilih=null;
let activeTab="chat",activeFilter="semua";
let timerInterval=null,resetAt=null;

const fmt=n=>"Rp "+n.toLocaleString("id-ID");
const now=()=>new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

// ══ CLOUD SYNC (background, tidak blocking) ══
function gasFetch(url,opts){
  return fetch(url,opts).then(r=>r.json()).catch(e=>{console.warn("GAS:",e);return null;});
}
function gasGet(action){ return gasFetch(GAS+"?action="+action); }
function gasPost(data){ return gasFetch(GAS,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}); }

function showSync(msg,isErr=false){
  const el=document.getElementById("sync-status");
  if(!el)return;
  el.textContent=msg; el.style.display="block";
  el.className="sync-bar"+(isErr?" err":"");
  setTimeout(()=>el.style.display="none",3000);
}

async function syncCloud(){
  // Tampilkan data lokal dulu (tidak nunggu cloud)
  renderRekap();
  showSync("🔄 Sync dari Google Sheets...");
  try {
    const res=await gasGet("getAll");
    if(res&&res.status==="ok"&&Array.isArray(res.orders)){
      // Pakai data cloud sebagai sumber utama
      ORDERS = res.orders;
      updateBadge(); renderRekap();
      showSync("✅ "+ORDERS.length+" pesanan tersinkron!");
      const tr=await gasGet("getTimer");
      if(tr&&tr.resetAt&&tr.resetAt>Date.now()&&!timerInterval) startCountdown(tr.resetAt);
    } else {
      showSync("⚠️ Cloud belum response, data lokal ditampilkan",true);
    }
  } catch(e) {
    showSync("⚠️ Gagal koneksi, data lokal ditampilkan",true);
  }
}

// ══ TIMER ══
function startCountdown(ts){
  if(timerInterval) clearInterval(timerInterval);
  resetAt=ts; timerInterval=setInterval(tickTimer,1000); tickTimer();
}
function tickTimer(){
  const sisa=resetAt-Date.now();
  const box=document.getElementById("timer-box"); if(!box)return;
  if(sisa<=0){
    clearInterval(timerInterval);timerInterval=null;resetAt=null;
    ORDERS=[];updateBadge();
    gasPost({action:"resetAll"});
    if(activeTab==="rekap")renderRekap();
    box.textContent="✅ Auto-reset selesai";box.style.color="#4caf82";box.style.borderColor="#4caf82";
    setTimeout(()=>{box.textContent="⏳ Timer belum mulai";box.style.color="#555";box.style.borderColor="#2a2a2a";},3000);
    return;
  }
  const m=Math.floor(sisa/60000),s=Math.floor((sisa%60000)/1000);
  const pct=sisa/DURASI,w=pct>.5?"#4caf82":pct>.2?"#f5a623":"#e74c3c";
  box.style.color=w;box.style.borderColor=w;
  box.textContent=`🕐 Auto-reset: ${m}:${String(s).padStart(2,"0")}`;
}
function updateBadge(){
  document.getElementById("tab-rekap").textContent=ORDERS.length>0?`📋 Rekap (${ORDERS.length})`:"📋 Rekap";
}

// ══ TAB ══
let autoRefreshInterval = null;
function showTab(t){
  activeTab=t;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+t).classList.add("show");
  document.getElementById("tab-"+t).classList.add("active");
  if(t==="rekap"){
    syncCloud();
    // Auto refresh setiap 30 detik
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(syncCloud, 30000);
  } else {
    if(autoRefreshInterval){ clearInterval(autoRefreshInterval); autoRefreshInterval=null; }
  }
}

// ══ REKAP ══
function tagStyle(pay){
  const p=pay.toLowerCase();
  if(p.includes("dana")) return "color:#4da6ff;background:rgba(0,100,255,.12);border:1px solid rgba(0,100,255,.25)";
  if(p.includes("bsi"))  return "color:#4caf82;background:rgba(76,175,130,.12);border:1px solid rgba(76,175,130,.25)";
  if(p.includes("shopeepay")) return "color:#ff6b35;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.25)";
  return "color:#f5a623;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.25)";
}

function renderRekap(){
  const grand=ORDERS.reduce((s,o)=>s+(o.total||0),0);
  const last=ORDERS.length?ORDERS[ORDERS.length-1].nama:"—";
  document.getElementById("stat-grid").innerHTML=`
    <div class="stat-box"><div style="font-weight:800;font-size:22px;color:#f5a623">${ORDERS.length}</div><div style="font-size:10px;color:#555;margin-top:2px">Pesanan</div></div>
    <div class="stat-box"><div style="font-weight:800;font-size:${last.length>7?11:16}px;color:#4caf82;line-height:1.3">${last}</div><div style="font-size:10px;color:#555;margin-top:2px">Terbaru</div></div>
    <div class="stat-box"><div style="font-weight:800;font-size:12px;color:#f0ece4">${now()}</div><div style="font-size:10px;color:#555;margin-top:2px">Update</div></div>`;
  document.getElementById("grand-box").innerHTML=`
    <div style="font-size:12px;color:#666">💰 Grand Total (${ORDERS.length} orang)</div>
    <div style="font-weight:800;font-size:20px;color:#f5a623">${fmt(grand)}</div>`;
  const fr=document.getElementById("filter-row");fr.innerHTML="";
  [{k:"semua",l:"Semua"},{k:"dana",l:"💙 DANA"},{k:"bsi",l:"🏦 BSI"},{k:"shopeepay",l:"🧡 ShopeePay"},{k:"cash",l:"💵 Cash"}].forEach(f=>{
    const b=document.createElement("button");b.className="f-btn"+(activeFilter===f.k?" on":"");
    b.textContent=f.l;b.onclick=()=>{activeFilter=f.k;renderRekap();};fr.appendChild(b);
  });
  const filtered=activeFilter==="semua"?ORDERS:ORDERS.filter(o=>{
    const p=o.payment.toLowerCase();
    if(activeFilter==="dana") return p.includes("dana");
    if(activeFilter==="bsi")  return p.includes("bsi");
    if(activeFilter==="shopeepay") return p.includes("shopeepay");
    return !p.includes("dana")&&!p.includes("bsi")&&!p.includes("shopeepay");
  });
  const list=document.getElementById("order-list");
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div style="font-size:2.5rem;margin-bottom:10px">🍱</div><div style="font-weight:600;font-size:14px">Belum ada pesanan</div><div style="font-size:11px;margin-top:4px;color:#555">Pesanan dari tab 🍱 akan muncul di sini</div></div>`;
    return;
  }
  list.innerHTML=filtered.map((o,i)=>`
    <div class="order-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <div style="display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px">
          <div class="nbadge">${i+1}</div>${o.nama}</div>
        <span style="font-size:10px;color:#444">⏰ ${o.waktu||"—"}</span>
      </div>
      ${(o.pesanan||[]).map((p,j)=>`<div class="ritem"><span style="color:#888">${p.menu?p.menu.emoji:""} ${p.menu?p.menu.nama:""} x${p.qty}</span><span style="font-weight:600">${fmt((p.menu?p.menu.harga:0)*p.qty)}</span></div>`).join("")}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span class="pay-tag" style="${tagStyle(o.payment)}">${o.payment}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:800;font-size:15px;color:#f5a623">${fmt(o.total||0)}</span>
          <button onclick="batalOrder(${i})" style="background:rgba(231,76,60,.15);border:1px solid #e74c3c;color:#e74c3c;padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;">🗑️ Batal</button>
        </div>
      </div></div>`).join("");
}

async function batalOrder(i){
  if(!confirm("Batalkan pesanan ini?"))return;
  ORDERS.splice(i,1);
  updateBadge();renderRekap();
  await gasPost({action:"delOrder",index:i});
}

async function sendWA(){
  if(!ORDERS.length){alert("Belum ada pesanan!");return;}
  let txt=`📋 *REKAP PESANAN JASTIP*\n📅 ${new Date().toLocaleDateString("id-ID")} | ⏰ ${now()}\n👥 Total: ${ORDERS.length} orang\n━━━━━━━━━━━━━━━\n`;
  let g=0;
  ORDERS.forEach((o,i)=>{
    txt+=`\n${i+1}. 👤 *${o.nama}*\n`;
    (o.pesanan||[]).forEach(p=>{txt+=`   ${p.menu?p.menu.emoji:""} ${p.menu?p.menu.nama:""} x${p.qty} = ${fmt((p.menu?p.menu.harga:0)*p.qty)}\n`;});
    txt+=`   💳 ${o.payment} | 💰 *${fmt(o.total||0)}*\n`;g+=o.total||0;
  });
  txt+=`\n━━━━━━━━━━━━━━━\n🧾 *GRAND TOTAL: ${fmt(g)}*\n━━━━━━━━━━━━━━━\n_AI Jastip – Event Kita Kita_ 🧡`;
  window.open("https://wa.me/"+WA_ADMIN+"?text="+encodeURIComponent(txt),"_blank");
}

// ══ CHAT HELPERS ══
function scrollDown(){const a=document.getElementById("chat-area");setTimeout(()=>a.scrollTop=a.scrollHeight,50);}
function addBubble(who,html,delay=0){
  setTimeout(()=>{
    const a=document.getElementById("chat-area");
    const d=document.createElement("div");d.className="msg "+who;
    d.innerHTML=`<div class="bubble ${who}">${html}</div>`;
    a.appendChild(d);scrollDown();
  },delay);
}
function addEl(el,delay=0){setTimeout(()=>{document.getElementById("chat-area").appendChild(el);scrollDown();},delay);}
function setQR(opts){
  const row=document.getElementById("qr-row");row.innerHTML="";
  opts.forEach(o=>{const b=document.createElement("button");b.className="qr-btn";b.textContent=o;b.onclick=()=>kirim(o);row.appendChild(b);});
}

// ══ CARDS ══

  const d=document.createElement("div");d.className="card";

    h+=`<div class="mcat">${k.nama}</div>`;
    k.items.forEach(m=>{h+=`<div class="mitem"><span style="color:#aaa">${m.id}. ${m.emoji} ${m.nama}</span><span class="mprice">${fmt(m.harga)}</span></div>`;});
  });
  h+=`<div style="font-size:9px;color:#444;margin-top:8px;text-align:center;">⏰ Batas pesan jam 11.30 WIB</div>`;
  d.innerHTML=h;return d;
}

function bayarCard(){
  const d=document.createElement("div");d.className="card";d.style.maxWidth="320px";d.id="bayar-card";
  let h=`<div style="font-weight:800;font-size:13px;color:#f5a623;margin-bottom:10px;">💳 Pilih Metode Pembayaran</div>`;

    h+=`<div class="pay-opt" id="popt-${b.id}" onclick="pilihBayar('${b.id}')">

      <span style="color:#444;font-size:16px">›</span></div>`;
  });

}

// ══ PILIH BAYAR ══
function pilihBayar(id){
  if(dipilih)return;
  dipilih=id;
  BAYAR.forEach(b=>{
    const el=document.getElementById("popt-"+b.id);if(!el)return;
    el.classList.add(b.id===id?"dipilih":"blur");
  });
  const b=BAYAR.find(x=>x.id===id);
  const pay=b.nomor?`${b.nama} (${b.nomor})`:b.nama;
  const total=pesanan.reduce((s,p)=>s+p.menu.harga*p.qty,0);
  orderFinal={nama,pesanan:JSON.parse(JSON.stringify(pesanan)),payment:pay,total,waktu:now()};

  // Simpan ke memory LANGSUNG
  ORDERS.push(orderFinal);
  updateBadge();

  // Mulai timer lokal SEKARANG (tidak tunggu GAS)
  if(!timerInterval){
    const localReset = Date.now() + DURASI;
    startCountdown(localReset);
  }
  // Kirim ke cloud di background
  gasPost({action:"addOrder",order:orderFinal});
  gasPost({action:"setTimer"}).then(r=>{
    if(r&&r.resetAt){
      // Update ke timer dari cloud
      if(timerInterval) clearInterval(timerInterval);
      timerInterval=null;
      startCountdown(r.resetAt);
    }
  });

  addBubble("user",`${b.icon} ${b.nama}`);
  addBubble("bot","✅ Pesanan tersimpan! Ini rekapnya 👇",200);
  addEl(rekapMiniCard(orderFinal),600);
  addBubble("bot",`💰 Total: <b>${fmt(total)}</b>`,800);
  addBubble("bot",`Terima kasih <b>${nama}</b>! 🍱 Silahkan menunggu, pesananmu sedang diproses ya ✨`,1300);
  addBubble("bot","Mau pesan untuk orang lain, atau sudah selesai?",1900);
  setTimeout(()=>setQR(["Pesan untuk orang lain","Selesai"]),2000);
  step="selesai";
}

// ══ CHAT FLOW ══
function kirim(v){
  const val=(v||document.getElementById("user-input").value).trim();
  if(!val)return;
  document.getElementById("user-input").value="";setQR([]);
  addBubble("user",val);setTimeout(()=>proses(val),400);
}

function proses(val){
  if(step==="nama"){
    nama=val;
    addBubble("bot",`Hai <b>${val}</b>! 👋 Senang ketemu kamu~`);
    addBubble("bot","Ini daftar menu hari ini, ketik <b>nomor menu</b> yang mau dipesan! 👇",400);
    addEl(menuCard(),500);
    setTimeout(()=>setQR(["1","2","16","23","42"]),600);
    step="menu";return;
  }
  if(step==="menu"){
    const num=parseInt(val),found=ALL_MENU.find(m=>m.id===num);
    if(!found){addBubble("bot",`Nomor <b>${val}</b> tidak ada 😅 Ketik angka <b>1–54</b> ya!`);setTimeout(()=>setQR(["1","16","23","42","51"]),300);return;}
    curMenu=found;
    addBubble("bot",`Oke! <b>${found.emoji} ${found.nama}</b> — ${fmt(found.harga)} 🎉`);
    addBubble("bot","Mau pesan berapa porsi / pcs?",400);
    setTimeout(()=>setQR(["1","2","3"]),500);
    step="qty";return;
  }
  if(step==="qty"){
    const q=parseInt(val);
    if(!q||q<1||q>20){addBubble("bot","Ketik angka <b>1–20</b> ya!");setTimeout(()=>setQR(["1","2","3"]),300);return;}
    pesanan.push({menu:curMenu,qty:q});
    addBubble("bot",`✅ Ditambah! <b>${curMenu.nama} x${q}</b> = ${fmt(curMenu.harga*q)}`);
    addBubble("bot","Mau tambah menu lain? 😊",400);
    setTimeout(()=>setQR(["Ya, tambah lagi","Tidak, lanjut bayar"]),500);
    step="lagi";return;
  }
  if(step==="lagi"){
    if(val==="Ya, tambah lagi"){
      addBubble("bot","Oke! Ketik nomor menu lagi ya 👇");
      addEl(menuCard(),300);setTimeout(()=>setQR(["1","16","23","42","51"]),400);
      step="menu";return;
    }
    addBubble("bot","Siap! Pilih metode pembayaran di bawah ya 👇");
    addEl(bayarCard(),500);step="bayar";return;
  }
  if(step==="selesai"){
    if(val==="Pesan untuk orang lain"){
      nama="";pesanan=[];curMenu=null;orderFinal=null;dipilih=null;
      addBubble("bot","Oke! Nama pemesan berikutnya siapa? 😊");step="nama";return;
    }
    addBubble("bot","Terima kasih sudah memesan! 🙏 Selamat makan siang ya! 🍽️");
    addBubble("bot","— AI Jastip Event Kita Kita 🧡",500);
    setTimeout(()=>setQR(["🔄 Pesan lagi"]),600);step="done";return;
  }
  if(step==="done"){
    nama="";pesanan=[];curMenu=null;orderFinal=null;dipilih=null;
    document.getElementById("chat-area").innerHTML="";
    addBubble("bot","👋 Halo lagi! Siapa nama kamu? 😊",200);step="nama";return;
  }
}

// ══ INIT ══
document.getElementById("user-input").addEventListener("keydown",e=>{if(e.key==="Enter")kirim();});
addBubble("bot","👋 Halo! Selamat datang di <b>AI Jastip Event Kita Kita!</b> 🍱",200);
addBubble("bot","Aku siap bantu catat pesanan makan siang kamu 😄",800);
addBubble("bot","Boleh aku tau <b>nama kamu</b> dulu? 😊",1400);

// Load data dari GAS saat halaman pertama dibuka (background)
(async function initLoad(){
  try {
    const [ordersRes, timerRes] = await Promise.all([
      gasGet("getAll"),
      gasGet("getTimer")
    ]);
    if(ordersRes && ordersRes.status==="ok" && Array.isArray(ordersRes.orders)){
      ORDERS = ordersRes.orders;
      updateBadge();
    }
    if(timerRes && timerRes.resetAt && timerRes.resetAt > Date.now()){
      startCountdown(timerRes.resetAt);
    }
  } catch(e){ console.log("Init load:",e); }
})();
</script>
