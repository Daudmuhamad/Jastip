<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jastip v2 — Event Kita Kita</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --gold: #F5A623;
  --bg: #0d0d0d;
  --card: #181818;
  --card2: #202020;
  --border: #2c2c2c;
  --text: #f0f0f0;
  --muted: #777;
  --green: #22c55e;
  --red: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body { height:100%; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); overflow:hidden; }

/* ── PAGES ── */
.page {
  display:none; flex-direction:column;
  position:fixed; top:0; left:0; right:0; bottom:0;
}
.page.active { display:flex; }

/* ── LOGIN PAGE ── */
.login-wrap {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px; text-align:center;
  background: radial-gradient(ellipse at top, rgba(245,166,35,.1) 0%, transparent 60%), var(--bg);
}
.login-logo { font-size:52px; margin-bottom:16px; }
.login-title { font-size:28px; font-weight:800; margin-bottom:6px; }
.login-sub { font-size:13px; color:var(--muted); margin-bottom:32px; line-height:1.6; }
.login-input {
  width:100%; max-width:320px;
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px 16px;
  font-size:15px; color:var(--text); font-family:'Inter',sans-serif;
  margin-bottom:12px; outline:none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color:var(--gold); }
.login-btn {
  width:100%; max-width:320px;
  background:var(--gold); color:#000;
  border:none; border-radius:12px;
  padding:14px; font-size:15px; font-weight:800;
  cursor:pointer; font-family:'Inter',sans-serif;
  transition: opacity 0.2s;
}
.login-btn:active { opacity:0.8; }
.login-badge { margin-top:24px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.lbadge {
  background:var(--card2); border:1px solid var(--border);
  padding:5px 12px; border-radius:20px; font-size:11px; color:#aaa;
}

/* ── CHAT PAGE ── */
.chat-header {
  background:#111; border-bottom:1px solid var(--border);
  padding:12px 16px; display:flex; align-items:center; gap:12px;
  flex-shrink:0;
}
.chat-av {
  width:38px; height:38px; border-radius:50%;
  background:var(--gold); display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.chat-hdr-info {}
.chat-hdr-name { font-size:14px; font-weight:800; }
.chat-hdr-status { font-size:11px; color:var(--green); }
.chat-hdr-right { margin-left:auto; }
.order-badge {
  background:rgba(245,166,35,.15); border:1px solid rgba(245,166,35,.3);
  color:var(--gold); font-size:10px; font-weight:700;
  padding:4px 10px; border-radius:20px;
}

.chat-messages {
  flex:1; overflow-y:auto; padding:16px 12px;
  display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}

.msg-row { display:flex; align-items:flex-end; gap:8px; }
.msg-row.user { flex-direction:row-reverse; }

.msg-avatar { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
.msg-avatar.ai { background:var(--gold); }
.msg-avatar.usr { background:#2a2a2a; }

.bubble {
  max-width:78%; padding:10px 13px;
  font-size:13px; line-height:1.6;
  border-radius:16px;
}
.bubble.ai {
  background:var(--card2); border:1px solid var(--border);
  border-bottom-left-radius:4px; color:var(--text);
}
.bubble.user {
  background:var(--gold); color:#000; font-weight:600;
  border-bottom-right-radius:4px;
}
.bubble.system {
  background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.2);
  color:var(--green); font-size:12px; font-weight:600;
  border-radius:10px; max-width:90%; margin:0 auto;
  text-align:center;
}
.bubble.error {
  background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2);
  color:var(--red); font-size:12px;
}

.typing-indicator {
  display:none; align-items:center; gap:4px; padding:10px 13px;
  background:var(--card2); border:1px solid var(--border);
  border-radius:16px; border-bottom-left-radius:4px;
  width:fit-content;
}
.typing-indicator.show { display:flex; }
.dot-pulse { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:pulse 1.2s infinite; }
.dot-pulse:nth-child(2) { animation-delay:.2s; }
.dot-pulse:nth-child(3) { animation-delay:.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

.chat-input-area {
  background:#111; border-top:1px solid var(--border);
  padding:10px 12px; display:flex; gap:8px; align-items:flex-end;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.chat-input {
  flex:1; background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:10px 16px;
  font-size:14px; color:var(--text); font-family:'Inter',sans-serif;
  outline:none; resize:none; max-height:100px; line-height:1.5;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color:var(--gold); }
.send-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--gold); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0; transition:opacity .2s;
}
.send-btn:active { opacity:.8; }
.send-btn:disabled { opacity:.4; cursor:default; }

/* ── ADMIN PAGE ── */
.admin-header {
  background:#111; border-bottom:1px solid var(--border);
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.admin-title { font-size:15px; font-weight:800; color:var(--gold); }
.admin-live { background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.3); color:var(--green); font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; }

.admin-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; }

.admin-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.astat {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:12px 8px; text-align:center;
}
.astat-val { font-size:20px; font-weight:800; color:var(--gold); }
.astat-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

.admin-total {
  background:var(--card); border:1px solid rgba(245,166,35,.3);
  border-radius:10px; padding:14px;
  display:flex; justify-content:space-between; align-items:center;
}
.admin-total-lbl { font-size:13px; color:#ccc; font-weight:600; }
.admin-total-val { font-size:20px; font-weight:800; color:var(--gold); }

.order-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:13px;
}
.order-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.order-card-name { font-size:14px; font-weight:800; }
.order-card-pay { font-size:10px; font-weight:700; padding:3px 8px; border-radius:5px; }
.pay-dana  { background:rgba(96,165,250,.2); color:#60a5fa; }
.pay-bsi   { background:rgba(34,197,94,.15); color:var(--green); }
.pay-cash  { background:rgba(245,166,35,.15); color:var(--gold); }
.pay-shopeepay { background:rgba(255,80,80,.2); color:#ff5050; }
.order-card-items { font-size:12px; color:#bbb; line-height:1.8; }
.order-card-total { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:flex; justify-content:space-between; }
.order-card-total-lbl { font-size:12px; color:var(--muted); }
.order-card-total-val { font-size:13px; font-weight:800; color:var(--gold); }

.admin-actions { display:flex; flex-direction:column; gap:8px; }
.admin-btn {
  width:100%; padding:13px; border-radius:12px;
  font-size:14px; font-weight:700; cursor:pointer;
  border:none; font-family:'Inter',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:opacity .2s;
}
.admin-btn:active { opacity:.8; }
.btn-wa { background:#25D366; color:#000; }
.btn-toggle-open { background:var(--green); color:#000; }
.btn-toggle-close { background:var(--red); color:#fff; }
.btn-reset { background:var(--card2); border:1px solid var(--border); color:var(--text); }

.empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-state div:first-child { font-size:40px; margin-bottom:12px; }

/* Status bar */
.status-closed {
  background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
  border-radius:10px; padding:12px; text-align:center;
  font-size:13px; color:var(--red); font-weight:700;
}
</style>
</head>
<body>

<!-- ══════════ PAGE: LOGIN ══════════ -->

<!-- ══════════ PAGE: CHAT ══════════ -->
<div class="page" id="page-chat">

<!-- ══════════ PAGE: ADMIN ══════════ -->
<div class="page" id="page-admin">
  <div class="admin-header">
    <div>
      <div class="admin-title">📋 Admin Panel</div>
      <div style="font-size:11px;color:var(--muted)">Event Kita Kita</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="admin-live">● LIVE</div>
      <span onclick="showLogin()" style="font-size:11px;color:var(--muted);cursor:pointer">← Keluar</span>
    </div>
  </div>
  <div class="admin-body" id="adminBody">
    <!-- injected -->
  </div>
</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const MENU = [

  {id:36, name:"Otak-Otak Crispy",      price:5000,  cat:"Jajanan"},
  {id:37, name:"Tahu+Otak-Otak Crispy", price:10000, cat:"Jajanan"},

  {id:43, name:"Cilok",                 price:10000, cat:"Jajanan"},

  // Minuman
  {id:53, name:"Es Kelapa",             price:5000,  cat:"Minuman"},
  {id:54, name:"Kelapa Muda",           price:12000, cat:"Minuman"},
  {id:55, name:"Teh Poci",              price:5000,  cat:"Minuman"},
  {id:56, name:"Le Mineral 600ml",      price:5000,  cat:"Minuman"},
  {id:57, name:"Jus Jambu",             price:5000,  cat:"Minuman"},
  {id:58, name:"Jus Mangga",            price:10000, cat:"Minuman"},
  {id:59, name:"Jus Melon",             price:10000, cat:"Minuman"},
  {id:60, name:"Jus Alpukat",           price:10000, cat:"Minuman"},
  {id:61, name:"Jus Strawberry",        price:10000, cat:"Minuman"},
  {id:62, name:"Jus Jeruk",             price:5000,  cat:"Minuman"},
];

const rp = n => "Rp " + n.toLocaleString('id-ID');

// State
let userName = "";
let orders = JSON.parse(localStorage.getItem('jastip_orders') || '[]');
let isOpen = JSON.parse(localStorage.getItem('jastip_open') ?? 'true');
let chatHistory = [];
let currentUserOrder = null; // pending order being built
let isThinking = false;

function saveOrders() { localStorage.setItem('jastip_orders', JSON.stringify(orders)); }
function saveOpen()   { localStorage.setItem('jastip_open', JSON.stringify(isOpen)); }

// ══════════════════════════════════════
// PAGE NAVIGATION
// ══════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLogin() { showPage('page-login'); }
function showAdmin() { showPage('page-admin'); renderAdmin(); }

function startChat() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  userName = name;
  chatHistory = [];
  pendingItems = []; pendingPayment = ''; awaitingConfirm = false; awaitingPayment = false;
  showPage('page-chat');
  initChat();
}

// ══════════════════════════════════════
// CHAT
// ══════════════════════════════════════
function initChat() {
  document.getElementById('chatMessages').innerHTML = `
    <div class="msg-row" id="typingRow" style="display:none">
      <div class="msg-avatar ai">🍱</div>
      <div class="typing-indicator show" id="typingDots">
        <div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div>
      </div>
    </div>`;

  if (!isOpen) {
    appendBubble('ai', '🔴 Maaf ' + userName + ', pemesanan sedang <b>ditutup</b> sementara. Silakan coba lagi nanti ya!');
    return;
  }

  const existing = orders.find(o => o.name.toLowerCase() === userName.toLowerCase());
  if (existing) {
    appendBubble('system', '✅ Hai ' + userName + '! Pesanan kamu sebelumnya sudah tercatat.');
    appendBubble('ai', 'Hai lagi <b>' + userName + '</b>! 👋 Kamu sudah pesan:\n' +
      existing.items.map(i => '• ' + i.name + ' x' + i.qty + ' — ' + rp(i.price*i.qty)).join('\n') +
      '\n\nTotal: <b>' + rp(existing.total) + '</b> via <b>' + existing.payment + '</b>\n\nMau tambah atau ubah pesanan?');
    return;
  }

  appendBubble('ai', 'Halo <b>' + userName + '</b>! 👋 Selamat datang di AI Jastip!\n\nKamu bisa langsung ceritain mau pesan apa — bebas ketik, gak perlu pilih nomor! Misalnya:\n\n💬 <i>"mau ayam goreng 2 porsi sama es teh"</i>\n💬 <i>"naspad rendang 1, bayar Dana"</i>\n\nMau pesan apa hari ini? 😊');
}

function appendBubble(type, html, scroll = true) {
  const msgs = document.getElementById('chatMessages');
  const typing = document.getElementById('typingRow');

  const row = document.createElement('div');

  if (type === 'system') {
    row.innerHTML = `<div class="bubble system">${html}</div>`;
    row.style.display = 'flex';
    row.style.justifyContent = 'center';
  } else if (type === 'user') {
    row.className = 'msg-row user';
    row.innerHTML = `<div class="msg-avatar usr">👤</div><div class="bubble user">${html}</div>`;
  } else if (type === 'error') {
    row.innerHTML = `<div class="bubble error" style="max-width:90%;margin:0 auto">${html}</div>`;
    row.style.display = 'flex'; row.style.justifyContent = 'center';
  } else {
    row.className = 'msg-row';
    row.innerHTML = `<div class="msg-avatar ai">🍱</div><div class="bubble ai">${html.replace(/\n/g,'<br>')}</div>`;
  }

  msgs.insertBefore(row, typing);
  if (scroll) msgs.scrollTop = msgs.scrollHeight;
}

function setTyping(show) {
  document.getElementById('typingRow').style.display = show ? 'flex' : 'none';
  document.getElementById('chatMessages').scrollTop = 9999;
}

function updateOrderBadge() {
  const existing = orders.find(o => o.name.toLowerCase() === userName.toLowerCase());
  const count = existing ? existing.items.reduce((a,b)=>a+b.qty,0) : 0;
  document.getElementById('orderBadge').textContent = count + ' item';
}

async function sendMessage() {
  if (isThinking) return;
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if (!txt) return;

  inp.value = '';
  inp.style.height = '';
  appendBubble('user', txt);
  chatHistory.push({role:'user', content:txt});

  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  setTyping(true);

  try {
    const reply = await callClaude();
    setTyping(false);
    appendBubble('ai', reply);
    chatHistory.push({role:'assistant', content:reply});

    // Extract and save order if confirmed
    tryExtractOrder(reply);
    updateOrderBadge();
  } catch(e) {
    setTyping(false);
    appendBubble('error', '⚠️ Koneksi bermasalah. Coba kirim lagi ya!');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

};

const CONFIRM_WORDS = ['iya','iyah','ok','oke','yap','yep','yes','bener','betul','lanjut','confirm','benar','setuju','gas','jalan','bisa','boleh','fix','deal','siap'];
const CANCEL_WORDS  = ['batal','cancel','ganti','ubah','salah','hapus'];

function extractQty(text) {
  // "2 porsi", "dua", "1x", angka
  const numMap = {'satu':1,'dua':2,'tiga':3,'empat':4,'lima':5,'enam':6,'tujuh':7,'delapan':8,'sembilan':9,'sepuluh':10};
  const m = text.match(/(\d+)\s*(porsi|pcs|biji|buah|x)?/i);
  if (m) return parseInt(m[1]);
  for (const [word, val] of Object.entries(numMap)) {
    if (text.includes(word)) return val;
  }
  return 1;
}

function detectMenuItems(text) {
  const lower = text.toLowerCase();
  const found = [];

  // Sort aliases by length desc (match longest first)
  const sorted = Object.entries(ALIASES).sort((a,b) => b[0].length - a[0].length);
  const usedIds = new Set();

  for (const [alias, id] of sorted) {
    if (usedIds.has(id)) continue;
    if (lower.includes(alias)) {
      // Extract qty near this alias
      const idx = lower.indexOf(alias);
      const nearby = lower.substring(Math.max(0, idx-10), idx+alias.length+15);
      const qty = extractQty(nearby);
      const menuItem = MENU.find(m => m.id === id);
      if (menuItem) {
        found.push({...menuItem, qty});
        usedIds.add(id);
      }
    }
  }
  return found;
}

function detectPayment(text) {
  const lower = text.toLowerCase();
  for (const [alias, pay] of Object.entries(PAYMENT_ALIASES)) {
    if (lower.includes(alias)) return pay;
  }
  return '';
}

function calcTotal(items) {
  return items.reduce((a, i) => a + i.price * i.qty, 0);
}

function formatOrderSummary(items, payment) {
  let txt = items.map(i => `• ${i.name} x${i.qty} = ${rp(i.price * i.qty)}`).join('\n');
  txt += `\n\n💰 Total: <b>${rp(calcTotal(items))}</b>`;
  if (payment) txt += `\n💳 Bayar: <b>${payment}</b>`;
  return txt;
}

async function callClaude() {
  const lastMsg = chatHistory[chatHistory.length - 1].content.toLowerCase();
  const detectedItems = detectMenuItems(lastMsg);
  const detectedPay = detectPayment(lastMsg);
  const isConfirm = CONFIRM_WORDS.some(w => lastMsg.includes(w));
  const isCancel  = CANCEL_WORDS.some(w => lastMsg.includes(w));

  // Simulate thinking delay
  await new Promise(r => setTimeout(r, 600 + Math.random()*600));

  // ── CANCEL / RESET ──
  if (isCancel && (pendingItems.length > 0 || awaitingConfirm)) {
    pendingItems = []; pendingPayment = ''; awaitingConfirm = false; awaitingPayment = false;
    return 'Oke, pesanan dibatalin ya! 😊 Mau pesan ulang? Ceritain aja mau makan apa!';
  }

  // ── CONFIRM ──
  if (awaitingConfirm && isConfirm && pendingItems.length > 0 && pendingPayment) {
    // Save order
    const existing = orders.find(o => o.name.toLowerCase() === userName.toLowerCase());
    if (existing) {
      // Merge
      pendingItems.forEach(pi => {
        const ex = existing.items.find(ei => ei.id === pi.id);
        if (ex) ex.qty += pi.qty; else existing.items.push({...pi});
      });
      existing.total = calcTotal(existing.items);
      existing.payment = pendingPayment;
      existing.time = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    } else {
      orders.push({
        name: userName,
        items: pendingItems.map(i => ({id:i.id, name:i.name, qty:i.qty, price:i.price})),
        total: calcTotal(pendingItems),
        payment: pendingPayment,
        time: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})
      });
    }
    saveOrders();
    const total = calcTotal(pendingItems);
    const snap = [...pendingItems]; const pay = pendingPayment;
    pendingItems = []; pendingPayment = ''; awaitingConfirm = false; awaitingPayment = false;
    return `✅ <b>Pesanan ${userName} berhasil dicatat!</b> 🎉\n\n${snap.map(i=>`• ${i.name} x${i.qty}`).join('\n')}\n\n💰 Total: <b>${rp(total)}</b>\n💳 Bayar: <b>${pay}</b>\n\nMakasih ya ${userName}! Pesananmu udah masuk ke admin. Selamat makan siang! 🍱😊`;
  }

  // ── NEW ITEMS DETECTED ──
  if (detectedItems.length > 0) {
    // Add to pending (merge qty if same item)
    detectedItems.forEach(di => {
      const ex = pendingItems.find(p => p.id === di.id);
      if (ex) ex.qty += di.qty; else pendingItems.push({...di});
    });
  }

  if (detectedPay) pendingPayment = detectedPay;

  // ── CHECK WHAT'S MISSING ──
  if (pendingItems.length === 0) {
    // Nothing detected
    const greetings = ['halo','hai','hi','selamat','pagi','siang','sore'];
    if (greetings.some(g => lastMsg.includes(g))) {
      return `Halo ${userName}! 😊 Mau pesan apa hari ini? Langsung aja ketik, misalnya:\n\n💬 <i>"mau naspad rendang sama jus mangga"</i>\n💬 <i>"ayam goreng 2 porsi, bayar Dana"</i>`;
    }
    return `Hmm, gue belum nemu menu yang dimaksud nih 😅\n\nCoba sebutin nama makanannya ya, misalnya:\n• Naspad Ayam Goreng, Rendang, Bakso\n• Jus Mangga, Teh Poci, Es Kelapa\n\nMau pesan apa? 😊`;
  }

  if (!pendingPayment) {
    awaitingPayment = true;
    awaitingConfirm = false;
    const itemsText = pendingItems.map(i => `• ${i.name} x${i.qty} — ${rp(i.price*i.qty)}`).join('\n');
    return `Oke! Gue catetin:\n\n${itemsText}\n\n💰 Total: <b>${rp(calcTotal(pendingItems))}</b>\n\nMau bayar pakai apa? 💳\n<b>Dana / BSI / Shopeepay / Cash</b>`;
  }

  // All info complete — show confirmation
  awaitingConfirm = true;
  awaitingPayment = false;
  const itemsText = pendingItems.map(i => `• ${i.name} x${i.qty} — ${rp(i.price*i.qty)}`).join('\n');
  return `Oke ${userName}, ini konfirmasi pesananmu ya! 📋\n\n${itemsText}\n\n💰 Total: <b>${rp(calcTotal(pendingItems))}</b>\n💳 Bayar: <b>${pendingPayment}</b>\n\n<b>Bener kan? Ketik "iya" untuk konfirmasi atau "batal" untuk ubah</b> 😊`;
}

function tryExtractOrder(reply) {
  // Check if reply contains confirmation block
  if (!reply.includes('===KONFIRMASI PESANAN===')) return;

  // Check if user previously confirmed (last user message)
  const lastUser = [...chatHistory].reverse().find(m=>m.role==='user');
  if (!lastUser) return;

  const confirmWords = ['iya','ok','oke','yap','yep','yes','bener','betul','lanjut','confirm','benar','setuju','gas','jalan'];
  const isConfirmed = confirmWords.some(w => lastUser.content.toLowerCase().includes(w));
  if (!isConfirmed) return;

  // Parse the confirmation
  const lines = reply.split('\n');
  let nama = '', items = [], total = 0, payment = '';

  for (const line of lines) {
    if (line.startsWith('Nama:')) nama = line.replace('Nama:','').trim();
    if (line.startsWith('Items:')) {
      // "Items: Ayam Goreng x2 = Rp 16.000"
      const m = line.match(/Items:\s*(.+)\s*x(\d+)\s*=\s*Rp\s*([\d.,]+)/i);
      if (m) {
        const itemName = m[1].trim();
        const qty = parseInt(m[2]);
        const menuItem = MENU.find(mn => mn.name.toLowerCase().includes(itemName.toLowerCase().split(' ')[0]));
        const price = menuItem ? menuItem.price : 0;
        items.push({name:itemName, qty, price});
        total += price * qty;
      }
    }
    if (line.startsWith('Grand Total:')) {
      const m = line.match(/[\d.]+/g);
      if (m) total = parseInt(m.join('').replace('.',''));
    }
    if (line.startsWith('Pembayaran:')) payment = line.replace('Pembayaran:','').trim();
  }

  if (!nama || items.length === 0) return;

  // Remove existing order for same user then add new
  orders = orders.filter(o => o.name.toLowerCase() !== nama.toLowerCase());
  orders.push({ name: nama, items, total, payment, time: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) });
  saveOrders();
}

function renderAdmin() {
  const body = document.getElementById('adminBody');
  const total = orders.reduce((a,o)=>a+o.total,0);
  const totalItems = orders.reduce((a,o)=>a+o.items.reduce((b,i)=>b+i.qty,0),0);

  let html = '';

  // Status
  if (!isOpen) {
    html += `<div class="status-closed">🔴 Pemesanan Sedang DITUTUP</div>`;
  }

  // Stats
  html += `<div class="admin-stats">
    <div class="astat"><div class="astat-val">${orders.length}</div><div class="astat-lbl">Pemesan</div></div>
    <div class="astat"><div class="astat-val">${totalItems}</div><div class="astat-lbl">Total Item</div></div>
    <div class="astat"><div class="astat-val" style="font-size:14px">${orders.length>0?orders[orders.length-1].time:'-'}</div><div class="astat-lbl">Terakhir</div></div>
  </div>`;

  // Grand total
  html += `<div class="admin-total">
    <div class="admin-total-lbl">💰 Grand Total (${orders.length} orang)</div>
    <div class="admin-total-val">${rp(total)}</div>
  </div>`;

  // Orders
  if (orders.length === 0) {
    html += `<div class="empty-state"><div>📋</div><div>Belum ada pesanan masuk</div></div>`;
  } else {
    orders.forEach(o => {
      const payClass = o.payment.toLowerCase().includes('dana')?'pay-dana':
                       o.payment.toLowerCase().includes('bsi')?'pay-bsi':
                       o.payment.toLowerCase().includes('shopee')?'pay-shopeepay':'pay-cash';
      html += `<div class="order-card">
        <div class="order-card-top">
          <div>
            <div class="order-card-name">${o.name}</div>
            <div style="font-size:10px;color:var(--muted)">${o.time}</div>
          </div>
          <div class="order-card-pay ${payClass}">${o.payment}</div>
        </div>
        <div class="order-card-items">${o.items.map(i=>`• ${i.name} x${i.qty} — ${rp(i.price*i.qty)}`).join('<br>')}</div>
        <div class="order-card-total">
          <div class="order-card-total-lbl">Subtotal</div>
          <div class="order-card-total-val">${rp(o.total)}</div>
        </div>
      </div>`;
    });
  }

  // Actions
  const toggleClass = isOpen ? 'btn-toggle-close' : 'btn-toggle-open';
  const toggleLabel = isOpen ? '🔴 Tutup Pemesanan' : '🟢 Buka Pemesanan';
  html += `<div class="admin-actions">
    <button class="admin-btn btn-wa" onclick="kirimWA()">📤 Kirim Rekap ke WA</button>
    <button class="admin-btn ${toggleClass}" onclick="toggleOpen()">${toggleLabel}</button>
    <button class="admin-btn btn-reset" onclick="resetOrders()">🔄 Reset Semua Pesanan</button>
  </div>`;

  body.innerHTML = html;
}

function toggleOpen() {
  isOpen = !isOpen;
  saveOpen();
  renderAdmin();
}

function resetOrders() {
  if (!confirm('Reset semua pesanan? Tidak bisa dibatalkan!')) return;
  orders = [];
  saveOrders();
  renderAdmin();
}

function kirimWA() {
  if (orders.length === 0) { alert('Belum ada pesanan!'); return; }
  const total = orders.reduce((a,o)=>a+o.total,0);
  let txt = '🍱 *REKAP PESANAN JASTIP*\n_Event Kita Kita — ' + new Date().toLocaleDateString('id-ID') + '_\n\n';
  orders.forEach((o,i) => {
    txt += `${i+1}. *${o.name}*\n`;
    o.items.forEach(it => txt += `   • ${it.name} x${it.qty} — ${rp(it.price*it.qty)}\n`);
    txt += `   Bayar: ${o.payment} | Subtotal: *${rp(o.total)}*\n\n`;
  });
  txt += `━━━━━━━━━━━━━━━━\n💰 *GRAND TOTAL: ${rp(total)}*\n(${orders.length} orang, ${orders.reduce((a,o)=>a+o.items.reduce((b,i)=>b+i.qty,0),0)} item)`;
  window.open('https://wa.me/?text=' + encodeURIComponent(txt));
}
